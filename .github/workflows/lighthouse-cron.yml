name: Lighthouse Watch (cron)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Install deps
        run: npm ci

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: 8248657254:AAFgvi2tUJ06J8PGh-p2igyG1Wu7sSUxIvo
          TELEGRAM_CHAT_ID: 330076346
        run: npm run monitor

      - name: Commit updated baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain reports)" ]; then
            git add reports
            git commit -m "chore(lighthouse): update baseline $(date -u +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes in reports/"

